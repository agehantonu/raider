        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }

        input:checked + .slider { background: #0f0; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; }

<body class="p-4 text-xs">

    <div class="max-w-[1600px] mx-auto space-y-4">
        <header class="border-b-2 border-green-900 pb-2 flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-white font-mono"><span class="text-green-500 text-xs">trlz discord raider</span></h1>
            <div class="flex gap-4">
                <div id="tabSender" onclick="switchTab('sender')" class="tab-btn active uppercase">Message Sender</div>
                <div id="tabReactor" onclick="switchTab('reactor')" class="tab-btn uppercase">trlz on top</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            
            <div class="space-y-4">
                <div class="panel">
                    <label class="text-[9px] text-zinc-600 font-bold uppercase">token</label>
                    <textarea id="tokensText" class="w-full h-32 p-2 mt-2 text-[10px] rounded resize-none" placeholder="Tokens..."></textarea>
                </div>
                <div class="panel border-blue-900 bg-blue-950/10">
                    <label class="text-[9px] text-blue-400 font-bold uppercase">サーバー招待リンク</label>
                    <input type="text" id="inviteCode" class="w-full p-2 mt-2 rounded mb-2 text-white font-bold" placeholder="discord.gg/trlz">
                    <button onclick="joinServer()" class="w-full bg-blue-700 hover:bg-blue-600 text-white py-2 rounded font-black text-[10px]">join</button>
                </div>
                <div id="logArea" class="panel h-64 overflow-y-auto font-mono text-[9px] text-zinc-600 border-zinc-900">
                    <div>ログ</div>
                </div>
            </div>

            <div class="lg:col-span-3">
                
                <div id="contentSender" class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="panel flex flex-col gap-2 h-[500px]">
                        <label class="text-[9px] text-zinc-600 font-bold">3. SCANNER</label>
                        <input type="text" id="guildId" class="w-full p-2 rounded text-white font-bold" placeholder="サーバーid">
                        <button onclick="fullScan()" class="w-full bg-zinc-900 py-2 rounded font-black text-green-400 border border-zinc-700 mb-2">uidとチャンネルid自動取得</button>
                        <textarea id="channelList" class="flex-1 w-full p-2 text-[9px] rounded resize-none" placeholder="チャンネルid"></textarea>
                        <textarea id="uidList" class="flex-1 w-full p-2 text-[9px] rounded resize-none" placeholder="ユーザーid"></textarea>
                    </div>
                    <div class="lg:col-span-2 panel">
                        <label class="text-[9px] text-zinc-600 font-bold">メッセージ設定</label>
                        <textarea id="message" class="w-full h-24 p-2 mt-2 text-xs rounded mb-4" placeholder="メッセージ本文を入力"></textarea>
                        
                        <div class="grid grid-cols-2 gap-4 bg-zinc-950 p-4 rounded border border-zinc-800 mb-4 font-bold">
                            <div class="space-y-3">
                                <div class="flex justify-between items-center text-[10px]">
                                    <span>メンション数:</span>
                                    <input type="number" id="mentionCount" value="1" class="w-10 bg-black text-green-400 border border-zinc-700 px-1 text-center">
                                </div>
                                <div class="flex justify-between items-center text-[10px]">                              
                            </div>
                            <div class="space-y-3">
                                <div class="flex justify-between items-center text-[10px]">
                                    <span>送信間隔(秒):</span>
                                    <input type="number" id="intervalSec" value="0.1" step="0.01" class="w-14 bg-black text-green-400 border border-zinc-700 px-1 text-center">
                                </div>
                                <div class="flex justify-between items-center text-[10px]">
                                    <span>ランダム文字列:</span>
                                    <label class="switch"><input type="checkbox" id="useRandomStr" checked=""><span class="slider"></span></label>
                                </div>
                            </div>
                        </div>
                        <button onclick="execute()" id="execBtn" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-6 rounded text-sm tracking-widest transition-all mb-2 shadow-lg shadow-green-900/20">送信開始</button>
                        <button onclick="stop()" class="w-full bg-zinc-900 text-red-500 border border-red-900 py-2 rounded font-bold hover:bg-red-800 hover:text-white transition-all">停止</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body></html>
