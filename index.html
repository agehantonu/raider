<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trlz raider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Meiryo', monospace; }
        .panel { background: #050505; border: 1px solid #1a1a1a; padding: 15px; border-radius: 4px; }
        textarea, input { background: #000 !important; border: 1px solid #222 !important; color: #0f0 !important; outline: none; }
        textarea:focus, input:focus { border-color: #0f0 !important; box-shadow: 0 0 10px #0f03; }
        .log-line { font-size: 10px; border-bottom: 1px solid #111; padding: 2px 0; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #222; border-radius: 20px; transition: .3s; }
        input:checked + .slider { background: #0f0; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="p-4 text-xs">
    <div class="max-w-[1600px] mx-auto space-y-4">
        <header class="border-b-2 border-green-900 pb-2 flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-white font-mono"><span class="text-green-500 text-xs">trlz </span>trlz raider</h1>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="panel space-y-4">
                <div>
                    <label class="text-green-500 font-bold mb-2 block text-xs">token</label>
                    <textarea id="tokensText" class="w-full h-64 p-2 text-[10px] font-mono resize-none border border-zinc-800 bg-black"></textarea>
                </div>
                <div>
                    <label class="text-green-500 font-bold mb-2 block text-xs">joiner</label>
                    <input type="text" id="inviteCode" class="w-full p-2 bg-black border border-zinc-800" placeholder="コード">
                    <button onclick="joinServer()" class="w-full mt-2 bg-blue-700 text-white p-2 font-bold">join</button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="panel space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-green-500 font-bold mb-2 block">サーバーID</label>
                            <input type="text" id="guildId" class="w-full p-2 bg-black border border-zinc-800">
                            <div class="grid grid-cols-2 gap-1 mt-2">
                                <button onclick="fullScan()" class="bg-zinc-900 border border-zinc-700 p-1 text-[8px]">CH取得</button>
                                <button onclick="fetchUIDs()" class="bg-zinc-900 border border-zinc-700 p-1 text-[8px]">UID取得</button>
                            </div>
                        </div>
                        <div>
                            <label class="text-green-500 font-bold mb-2 block">チャンネルID</label>
                            <textarea id="channelList" class="w-full h-24 p-2 text-[10px] font-mono resize-none border border-zinc-800 bg-black"></textarea>
                        </div>
                    </div>

                    <div>
                        <label class="text-green-500 font-bold mb-2 block">送信メッセージ</label>
                        <textarea id="message" class="w-full h-32 p-2 text-[10px] font-mono resize-none border border-zinc-800 bg-black"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-3">
                            <div class="flex justify-between items-center bg-zinc-900/50 p-2 rounded">
                                <span>ランダムスティックな文字列</span>
                                <label class="switch"><input type="checkbox" id="useRandomStr"><span class="slider"></span></label>
                            </div>
                            <div class="flex justify-between items-center text-[10px]">
                                <span>送信回数</span>
                                <input type="number" id="sendCount" value="1" class="w-12 p-1 text-center bg-black border border-zinc-800">
                            </div>
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center text-[10px]">
                                <span>メンション数</span>
                                <input type="number" id="mentionCount" value="1" class="w-12 p-1 text-center bg-black border border-zinc-800">
                            </div>
                            <textarea id="uidList" class="w-full h-16 p-2 text-[9px] font-mono border border-zinc-800 bg-black" placeholder="UIDリスト"></textarea>
                        </div>
                    </div>

                    <div class="space-y-2 pt-4">
                        <button onclick="executeBurst()" class="w-full bg-green-600 text-black py-4 text-2xl font-black italic shadow-lg uppercase">raid</button>
                        <button onclick="stop()" class="w-full bg-red-600 text-white py-2 font-bold uppercase">停止</button>
                        <button onclick="leaveServer()" class="w-full bg-zinc-800 text-zinc-400 py-2 font-bold border border-zinc-600">退出</button>
                    </div>
                </div>
            </div>

            <div class="panel flex flex-col h-[500px]">
                <div class="border-b border-green-900 pb-2 mb-2">
                    <span class="text-green-500 font-bold uppercase">LOG</span>
                </div>
                <div id="logArea" class="flex-1 overflow-y-auto space-y-1 font-mono"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
